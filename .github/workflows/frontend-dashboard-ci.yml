name: frontend-dashboard-ci

on:
  push:
    paths:
      - "frontend/dashboard-blueprint/**"
      - ".github/workflows/frontend-dashboard-ci.yml"
  pull_request:
    paths:
      - "frontend/dashboard-blueprint/**"
      - ".github/workflows/frontend-dashboard-ci.yml"

jobs:
  build:
    if: ${{ hashFiles('frontend/dashboard-blueprint/package.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
        working-directory: frontend/dashboard-blueprint
      - name: Build
        env:
          VITE_API_URL: /api
          VITE_BASE_PATH: /dashboard/
        run: npm run build
        working-directory: frontend/dashboard-blueprint
