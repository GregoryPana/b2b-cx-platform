name: deploy-staging-local

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: staging-deploy-local
  cancel-in-progress: false

jobs:
  deploy_local:
    runs-on: [self-hosted, linux, staging]
    env:
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release bundle (local runner)
        shell: bash
        run: |
          bash scripts/linux/build_release_bundle.sh "${RUNNER_TEMP}/cwscx-release.zip"

      - name: Install release bundle on VM
        shell: bash
        run: |
          bash scripts/linux/install_release_bundle.sh "${RUNNER_TEMP}/cwscx-release.zip"

      - name: Deploy backend
        shell: bash
        run: |
          bash /opt/cwscx/scripts/linux/deploy_backend.sh

      - name: Deploy frontends
        shell: bash
        run: |
          bash /opt/cwscx/scripts/linux/deploy_frontends.sh

      - name: Deploy nginx
        shell: bash
        run: |
          sudo bash /opt/cwscx/scripts/linux/deploy_nginx.sh

      - name: Verify staging
        shell: bash
        run: |
          BASE_URL="${STAGING_BASE_URL:-https://cwscx-tst01.cwsey.com}"
          STAGING_BASE_URL="${BASE_URL}" bash /opt/cwscx/scripts/linux/verify_staging.sh
