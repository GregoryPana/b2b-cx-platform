name: deploy-staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.deploy_gate.outputs.should_deploy }}
      backend: ${{ steps.changes.outputs.backend }}
      dashboard: ${{ steps.changes.outputs.dashboard }}
      surveys: ${{ steps.changes.outputs.surveys }}
      mystery: ${{ steps.changes.outputs.mystery }}
      infra: ${{ steps.changes.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Validate workspace sources for local build
        shell: bash
        run: |
          set -euo pipefail
          REQUIRED_PATHS=(
            "backend/app/main.py"
            "backend/requirements.txt"
            "frontend/dashboard-blueprint/package.json"
            "frontend/survey/package.json"
            "scripts/linux/build_release_bundle.sh"
            "scripts/linux/install_release_bundle.sh"
          )

          for path in "${REQUIRED_PATHS[@]}"; do
            if [[ ! -e "${path}" ]]; then
              echo "::error::Missing required source path in runner workspace: ${path}"
              exit 1
            fi
          done

          echo "Workspace source validation passed for commit $(git rev-parse --short HEAD)"

      - name: Detect changed components
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'scripts/linux/deploy_backend.sh'
              - 'scripts/linux/install_release_bundle.sh'
            dashboard:
              - 'frontend/dashboard-blueprint/**'
              - '.github/workflows/frontend-dashboard-ci.yml'
            surveys:
              - 'frontend/survey/**'
              - '.github/workflows/frontend-survey-ci.yml'
            mystery:
              - 'frontend/mystery-shopper/**'
            infra:
              - 'scripts/linux/**'
              - '.github/workflows/**'
              - 'ENTERPRISE_DEPLOYMENT_RUNBOOK.md'
              - 'README.md'

      - name: Decide whether to deploy
        id: deploy_gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=false" >> "$GITHUB_OUTPUT"

  backend_ci:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.should_deploy == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: backend
          TESTING: true
          DATABASE_URL: sqlite:///./ci.db
          ENTRA_TENANT_ID: ci-tenant
          ENTRA_CLIENT_ID: ci-client
          ENTRA_AUTHORITY: https://login.microsoftonline.com/ci-tenant
          ENTRA_ISSUER: https://sts.windows.net/ci-tenant/
          ENTRA_AUDIENCE: api://ci-client
        run: pytest backend/tests

  dashboard_ci:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.should_deploy == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        working-directory: frontend/dashboard-blueprint
      - name: Build
        env:
          VITE_API_URL: /api
          VITE_BASE_PATH: /dashboard/
        run: npm run build
        working-directory: frontend/dashboard-blueprint

  survey_ci:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.should_deploy == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        working-directory: frontend/survey
      - name: Build
        env:
          VITE_API_URL: /api
          VITE_BASE_PATH: /surveys/b2b/
        run: npm run build
        working-directory: frontend/survey

  installation_dashboard_ci:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.should_deploy == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        working-directory: frontend/installation-dashboard
      - name: Build
        env:
          VITE_API_URL: /api
          VITE_BASE_PATH: /surveys/installation/
        run: npm run build
        working-directory: frontend/installation-dashboard

  deploy:
    runs-on: [self-hosted, linux]
    environment: staging
    needs: [changes, backend_ci, dashboard_ci, survey_ci, installation_dashboard_ci]
    if: ${{ needs.changes.outputs.should_deploy == 'true' && needs.backend_ci.result == 'success' && needs.dashboard_ci.result == 'success' && needs.survey_ci.result == 'success' && needs.installation_dashboard_ci.result == 'success' }}
    env:
      RELEASE_ID: staging-${{ github.run_number }}-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Sync workspace to triggering commit
        shell: bash
        run: |
          set -euo pipefail
          if git cat-file -e "${GITHUB_SHA}^{commit}" 2>/dev/null; then
            echo "Commit ${GITHUB_SHA} already present in local checkout."
          else
            FETCH_OK="false"
            for attempt in 1 2 3 4 5; do
              if git fetch --all --tags --prune; then
                FETCH_OK="true"
                break
              fi
              echo "git fetch failed (attempt ${attempt}/5); retrying in $((attempt * 3))s..."
              sleep $((attempt * 3))
            done

            if [[ "${FETCH_OK}" != "true" ]]; then
              echo "::error::git fetch failed after retries."
              exit 1
            fi
          fi

          git checkout --force "${GITHUB_SHA}"
          git clean -ffdx
          echo "Deploying commit: $(git rev-parse --short HEAD)"

      - name: Validate workspace sources for build
        shell: bash
        run: |
          set -euo pipefail
          REQUIRED_PATHS=(
            "backend/app/main.py"
            "backend/requirements.txt"
            "frontend/dashboard-blueprint/package.json"
            "frontend/survey/package.json"
            "scripts/linux/build_release_bundle.sh"
            "scripts/linux/install_release_bundle.sh"
          )

          for path in "${REQUIRED_PATHS[@]}"; do
            if [[ ! -e "${path}" ]]; then
              echo "::error::Missing required source path in runner workspace: ${path}"
              exit 1
            fi
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release bundle
        shell: bash
        run: |
          bash scripts/linux/build_release_bundle.sh "${RUNNER_TEMP}/cwscx-release.zip"

      - name: Install and deploy on staging VM (local runner)
        shell: bash
        env:
          RELEASE_ID: ${{ env.RELEASE_ID }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          set -euo pipefail

          TARGET_ROOT="/opt/cwscx"
          if [[ ! -w "${TARGET_ROOT}" ]]; then
            echo "::error::Runner user cannot write to ${TARGET_ROOT}. Run: sudo chown -R $(whoami):www-data ${TARGET_ROOT}"
            exit 1
          fi

          if ! sudo -n /usr/bin/systemctl --version >/dev/null 2>&1 && ! sudo -n /bin/systemctl --version >/dev/null 2>&1; then
            echo "::error::Passwordless sudo for systemctl is required for deploy."
            exit 1
          fi

          if ! sudo -n /usr/bin/bash -lc 'exit 0' >/dev/null 2>&1 && ! sudo -n /bin/bash -lc 'exit 0' >/dev/null 2>&1; then
            echo "::error::Passwordless sudo for bash is required to run deploy scripts as root."
            exit 1
          fi

          TS="$(date +%Y%m%d-%H%M%S)"
          SAFE_RELEASE_ID="${RELEASE_ID:-staging-${TS}}"
          mkdir -p "${TARGET_ROOT}/releases"
          NEW_BUNDLE="${TARGET_ROOT}/releases/cwscx-release-${SAFE_RELEASE_ID}.zip"
          cp -f "${RUNNER_TEMP}/cwscx-release.zip" "${NEW_BUNDLE}"

          PREV_BUNDLE="$(ls -1t "${TARGET_ROOT}"/releases/cwscx-release-*.zip 2>/dev/null | grep -v "${SAFE_RELEASE_ID}" | head -n1 || true)"

          deploy_release() {
            bash scripts/linux/install_release_bundle.sh "${NEW_BUNDLE}"
            bash scripts/linux/deploy_backend.sh
            bash scripts/linux/deploy_frontends.sh
            sudo bash scripts/linux/deploy_nginx.sh
            STAGING_BASE_URL="${STAGING_BASE_URL:-https://cwscx-tst01.cwsey.com}" bash scripts/linux/verify_staging.sh
          }

          rollback_release() {
            if [[ -z "${PREV_BUNDLE}" || ! -f "${PREV_BUNDLE}" ]]; then
              echo "No previous release bundle available for rollback."
              return
            fi

            echo "Rolling back using ${PREV_BUNDLE}"
            bash scripts/linux/install_release_bundle.sh "${PREV_BUNDLE}"
            bash scripts/linux/deploy_backend.sh || true
            bash scripts/linux/deploy_frontends.sh || true
            sudo bash scripts/linux/deploy_nginx.sh || true
            STAGING_BASE_URL="${STAGING_BASE_URL:-https://cwscx-tst01.cwsey.com}" bash scripts/linux/verify_staging.sh || true
          }

          if deploy_release; then
            echo "Staging deploy succeeded."
          else
            echo "Staging deploy failed. Initiating rollback."
            rollback_release
            exit 1
          fi

      - name: Publish Deploy Summary
        if: always()
        shell: bash
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          BASE_URL="${STAGING_BASE_URL:-https://cwscx-tst01.cwsey.com}"
          BACKEND_CHANGED="${{ needs.changes.outputs.backend }}"
          DASHBOARD_CHANGED="${{ needs.changes.outputs.dashboard }}"
          SURVEYS_CHANGED="${{ needs.changes.outputs.surveys }}"
          MYSTERY_CHANGED="${{ needs.changes.outputs.mystery }}"
          INFRA_CHANGED="${{ needs.changes.outputs.infra }}"
          COMMIT_SHA="${{ github.sha }}"
          TRIGGER_EVENT="${{ github.event_name }}"
          JOB_STATUS="${{ job.status }}"

          {
            echo "## Staging Deploy Summary"
            echo ""
            printf -- "- Status: **%s**\n" "$JOB_STATUS"
            printf -- "- Release ID: `%s`\n" "$RELEASE_ID"
            printf -- "- Commit: `%s`\n" "$COMMIT_SHA"
            printf -- "- Trigger: `%s`\n" "$TRIGGER_EVENT"
            echo ""
            echo "### Changed Components"
            printf -- "- Backend: `%s`\n" "$BACKEND_CHANGED"
            printf -- "- Dashboard (blueprint): `%s`\n" "$DASHBOARD_CHANGED"
            printf -- "- Surveys (B2B/Installation): `%s`\n" "$SURVEYS_CHANGED"
            printf -- "- Mystery Shopper: `%s`\n" "$MYSTERY_CHANGED"
            printf -- "- Infra: `%s`\n" "$INFRA_CHANGED"
            echo ""
            echo "### Health / Routes"
            echo "- ${BASE_URL}/api/health"
            echo "- ${BASE_URL}/dashboard/"
            echo "- ${BASE_URL}/surveys/b2b/"
            echo "- ${BASE_URL}/surveys/installation/"
            echo ""
            echo "### Notes"
            echo "- VM deploy includes rollback attempt when verification fails."
            echo "- See step logs: **Install and deploy on VM (with rollback)** for rollback details."
          } >> "$GITHUB_STEP_SUMMARY"
