name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: backend
          TESTING: true
          DATABASE_URL: sqlite:///./ci.db
          ENTRA_TENANT_ID: ci-tenant
          ENTRA_CLIENT_ID: ci-client
          ENTRA_AUTHORITY: https://login.microsoftonline.com/ci-tenant
          ENTRA_ISSUER: https://sts.windows.net/ci-tenant/
          ENTRA_AUDIENCE: api://ci-client
        run: pytest backend/tests
