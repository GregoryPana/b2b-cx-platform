name: frontend-survey-ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    paths:
      - "frontend/survey/**"
      - "frontend/mystery-shopper/**"
      - "frontend/installation-survey/**"
      - ".github/workflows/frontend-survey-ci.yml"
  pull_request:
    paths:
      - "frontend/survey/**"
      - "frontend/mystery-shopper/**"
      - "frontend/installation-survey/**"
      - ".github/workflows/frontend-survey-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        working-directory: frontend/survey
      - name: Build
        env:
          VITE_API_URL: /api
          VITE_BASE_PATH: /surveys/b2b/
        run: npm run build
        working-directory: frontend/survey
      - name: Install dependencies (installation survey)
        run: npm ci --no-audit --no-fund
        working-directory: frontend/installation-survey
      - name: Build (installation survey)
        env:
          VITE_API_URL: /api
          VITE_BASE_PATH: /surveys/installation/
        run: npm run build
        working-directory: frontend/installation-survey
      - name: Install dependencies (mystery shopper survey)
        run: npm ci --no-audit --no-fund
        working-directory: frontend/mystery-shopper
      - name: Build (mystery shopper survey)
        env:
          VITE_API_URL: /api
          VITE_BASE_PATH: /surveys/mystery-shopper/
        run: npm run build
        working-directory: frontend/mystery-shopper
